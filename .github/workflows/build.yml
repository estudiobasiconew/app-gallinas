name: Build APK

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout FULL repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            python3-pip \
            build-essential \
            git \
            zip \
            unzip \
            openjdk-17-jdk \
            libncurses6 \
            libstdc++6 \
            zlib1g \
            libffi-dev \
            libssl-dev

      - name: Install Buildozer
        run: |
          python -m pip install --upgrade pip
          pip install buildozer cython

      - name: Locate buildozer.spec
        id: locate_spec
        run: |
          echo "🔍 Buscando buildozer.spec..."
          SPEC_PATH=$(find . -name "buildozer.spec" | head -n 1)

          if [ -z "$SPEC_PATH" ]; then
            echo "❌ No se encontró buildozer.spec"
            exit 1
          fi

          DIR_PATH=$(dirname "$SPEC_PATH")

          echo "📂 Encontrado en: $DIR_PATH"
          echo "spec_dir=$DIR_PATH" >> $GITHUB_OUTPUT

      - name: Show structure
        run: |
          pwd
          ls -la
          echo "📂 Carpeta detectada:"
          echo "${{ steps.locate_spec.outputs.spec_dir }}"
          ls -la "${{ steps.locate_spec.outputs.spec_dir }}"

      - name: Build APK
        working-directory: ${{ steps.locate_spec.outputs.spec_dir }}
        run: |
          buildozer android clean
          buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-gallinas-apk
          path: ${{ steps.locate_spec.outputs.spec_dir }}/bin/*.apk